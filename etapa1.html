<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Viaje - La Cueva de los Recuerdos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300;400;600&family=Cinzel+Decorative:wght@700&display=swap');

  /* VARIABLES TEMA CUEVA/PIRÁMIDE */
  :root {
    --color-glow: #f4c562;
    --color-glow-alt: #8b6b23;
    --bg-centro: #1a1305;
    --bg-borde: #050401;
    --texto-brillo: #f4c562;
    --color-inactivo: #2a2215;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  
  /* BLOQUEO TOTAL DEL SCROLL PARA EL JUGADOR */
  body, html {
    margin: 0; padding: 0; 
    background-color: var(--bg-borde); 
    font-family: 'Montserrat', sans-serif; 
    color: white;
    overflow: hidden; 
  }

  /* --- PANTALLA DE CONTRASEÑA INICIAL --- */
  #pantalla-password {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000; z-index: 10000; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
  }

  .caja-password {
    background: radial-gradient(circle at center, rgba(30, 22, 10, 0.95) 0%, rgba(10, 7, 2, 0.98) 100%);
    border: 1px solid var(--color-glow-alt);
    padding: 40px; border-radius: 10px; text-align: center;
    box-shadow: 0 0 30px rgba(244, 197, 98, 0.1);
    width: 85%; max-width: 400px;
  }

  .caja-password h2 {
    font-family: 'Cinzel Decorative', serif; color: var(--color-glow); margin-top: 0;
    font-size: 1.5rem; text-shadow: 0 0 10px rgba(244, 197, 98, 0.5);
  }

  .caja-password p { font-size: 0.9rem; color: #aaa; margin-bottom: 25px; }

  #input-pass-puerta {
    background: rgba(0,0,0,0.8); border: 1px solid var(--color-glow); color: var(--color-glow);
    padding: 12px 20px; border-radius: 5px; outline: none; text-align: center;
    font-family: 'Montserrat', sans-serif; font-size: 1rem; width: 100%;
    margin-bottom: 20px; letter-spacing: 2px;
  }
  
  #btn-entrar {
    background: transparent; border: 1px solid var(--color-glow); color: var(--color-glow);
    padding: 10px 30px; border-radius: 5px; font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    transition: 0.3s; width: 100%;
  }
  #btn-entrar:active { background: var(--color-glow); color: #000; }

  /* --- INTRO ARENA / LIBRO ANTIGUO --- */
  #arena-intro {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000; z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.5s ease;
  }
  
  #canvas-arena {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    opacity: 0.8; z-index: 1; pointer-events: none;
  }
  
  #contenedor-poema {
    position: absolute; top: 5%; left: 5%; width: 90vw; height: 90vh;
    z-index: 2; padding: 10vh 5vw; 
    display: flex; flex-direction: column; align-items: center; text-align: center;
    background: radial-gradient(circle at center, rgba(30, 22, 10, 0.95) 0%, rgba(10, 7, 2, 0.98) 100%);
    border: 2px solid rgba(244, 197, 98, 0.2);
    border-radius: 15px;
    box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 30px rgba(244, 197, 98, 0.1);
    overflow-y: auto; scroll-behavior: smooth;
  }
  #contenedor-poema::-webkit-scrollbar { width: 0px; }

  /* ESTILOS MÁGICOS DE LAS LETRAS FORMÁNDOSE */
  #texto-poema {
    font-family: 'Cinzel Decorative', serif; font-size: 1.15rem; line-height: 2.2;
    color: var(--texto-brillo); text-shadow: 0 0 10px rgba(244, 197, 98, 0.5);
    margin-bottom: 40px; max-width: 600px;
    /* Evita que las palabras se rompan raro al aparecer letra por letra */
    word-break: keep-all; 
  }
  
  .char-oculto {
    opacity: 0;
    filter: blur(15px); /* Inicia borroso como arena */
  }

  .char-visible {
    opacity: 1;
    filter: blur(0px);
    transition: opacity 0.5s ease-out, filter 0.5s ease-out; /* Transición mágica de polvo a letra */
  }

  /* BOTONES Y INPUTS DEL POEMA */
  .btn-saltar {
    position: absolute; top: 25px; right: 25px; z-index: 10;
    background: transparent; border: 1px solid var(--color-glow-alt);
    color: var(--color-glow-alt); padding: 8px 15px; border-radius: 5px;
    font-family: 'Montserrat', sans-serif; font-size: 0.7rem;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
  }
  .btn-saltar:active { background: var(--color-glow); color: #000; }

  #input-continuar-box { display: none; text-align: center; margin-top: auto; padding-bottom: 20px; width: 100%; }
  #input-continuar {
    background: rgba(0,0,0,0.8); border: 1px solid var(--color-glow); color: var(--color-glow);
    padding: 15px 30px; border-radius: 10px; outline: none; text-align: center;
    font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; width: 80%; max-width: 300px;
    box-shadow: 0 0 20px rgba(244, 197, 98, 0.3); transition: 0.3s; text-transform: uppercase;
  }
  #input-continuar:focus { box-shadow: 0 0 30px var(--color-glow); }

  /* FONDO MÍSTICO CUEVA */
  .fondo-cueva {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle at center, var(--bg-centro) 0%, var(--bg-borde) 100%); z-index: -2;
  }
  .respiracion {
    position: fixed; top: 50%; left: 50%; width: 150vw; height: 150vw; margin-top: -75vw; margin-left: -75vw;
    background: radial-gradient(circle, rgba(244, 197, 98, 0.08) 0%, rgba(139, 107, 35, 0.04) 30%, rgba(0,0,0,0) 60%);
    pointer-events: none; z-index: -1; animation: respirar 8s ease-in-out infinite;
  }
  @keyframes respirar { 0%, 100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

  /* --- HEADER HUD --- */
  .header-hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 85px;
    background: rgba(26, 19, 5, 0.85); border-bottom: 1px solid rgba(244, 197, 98, 0.1);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; z-index: 100; backdrop-filter: blur(15px);
  }
  .controles-izq { display: flex; align-items: center; gap: 10px; }
  
  .btn-accion-top {
    background: rgba(244, 197, 98, 0.05); border: 1px solid rgba(244, 197, 98, 0.3); 
    color: var(--color-glow); width: 38px; height: 38px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    cursor: pointer; backdrop-filter: blur(5px); font-size: 1.1rem; transition: 0.3s;
  }
  .btn-accion-top:active { transform: scale(0.9); background: var(--color-glow); color: black; }

  .titulo-seccion { font-family: 'Cinzel Decorative', serif; font-size: 1.4rem; color: #fff; margin: 0; text-shadow: 0 0 10px var(--color-glow); }
  .subtitulo-seccion { font-size: 0.65rem; color: var(--color-glow); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

  /* --- ÁREA DE CÁMARA Y MAPA --- */
  .camara-viewport {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 10; pointer-events: none; 
  }

  #lienzo-mapa {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 50vh; padding-bottom: 50vh; 
    pointer-events: auto; 
    transition: transform 1.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  
  #svg-caminos {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  
  .camino-base { stroke: transparent; fill: none; } 
  .camino-activo { 
    stroke: var(--color-glow); stroke-width: 4; fill: none; 
    filter: drop-shadow(0 0 8px var(--color-glow));
    transition: stroke-dashoffset 2s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  .nodo-wrapper { 
    display: flex; flex-direction: column; align-items: center; 
    margin-bottom: 90px; position: relative; z-index: 2;
    transition: all 1s ease; 
    opacity: 0; visibility: hidden; pointer-events: none; 
    transform: scale(0.5);
  }
  
  .nodo-wrapper.desbloqueado { 
    opacity: 1; visibility: visible; pointer-events: auto; 
    transform: scale(1);
  }
  
  .orbe-nivel { 
    width: 70px; height: 70px; border-radius: 5px; transform: rotate(45deg);
    background: rgba(26, 19, 5, 0.9); border: 2px solid var(--color-glow); 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 20px rgba(244, 197, 98, 0.4), inset 0 0 15px rgba(244, 197, 98, 0.2); 
    transition: all 0.3s;
  }
  
  .orbe-nivel:active { transform: rotate(45deg) scale(0.9); border-color: #fff; }
  
  .numero-nivel { 
    transform: rotate(-45deg); 
    font-family: 'Cinzel Decorative', serif; font-size: 1.5rem; 
    color: var(--texto-brillo); font-weight: bold;
    text-shadow: 0 0 10px var(--color-glow);
  }
  
  .titulo-nodo { 
    margin-top: 25px; font-size: 0.8rem; color: #fff; letter-spacing: 3px; 
    text-transform: uppercase; font-family: 'Cinzel Decorative', serif; 
    text-shadow: 0 0 10px var(--color-glow);
  }
</style>
</head>
<body>

  <!-- ============================================================== -->
  <!-- 📝 PANTALLA DE CONTRASEÑA -->
  <!-- ============================================================== -->
  <div id="pantalla-password" style="display: none;">
    <div class="caja-password">
      <h2>Puerta Sellada</h2>
      <p>Para ingresar a la Etapa 1, debes conocer la palabra.</p>
      <input type="password" id="input-pass-puerta" placeholder="Contraseña..." autocomplete="off">
      <button id="btn-entrar" onclick="verificarPassword()">Revelar Sendero</button>
      <p id="error-pass-puerta" style="color: #ff4757; font-size: 0.85rem; display: none; margin-top: 15px; margin-bottom: 0;">La palabra es incorrecta...</p>
    </div>
  </div>

  <script>
    // 📖 POEMA NUEVO Y LARGO
    const poemaLargo = [
      "Más allá de las horas y el ruido del mundo,",
      "donde el viento se cansa y el desierto calla,",
      "hemos construido un imperio de instantes,",
      "una fortaleza invisible a los ojos mortales.",
      "",
      "Cada grano de arena que cae en este reloj,",
      "no marca un final, sino nuestro comienzo.",
      "Aquí, las paredes guardan el eco de tus risas,",
      "y los pasillos brillan con la luz de tus pasos.",
      "",
      "No es casualidad que nuestros destinos colisionaran,",
      "éramos dos misterios buscando ser resueltos,",
      "dos mitades de un mapa antiguo y sagrado,",
      "que solo unidos revelan el tesoro escondido.",
      "",
      "En esta cueva, el pasado no duele,",
      "el futuro no asusta, el presente es eterno.",
      "Tus manos son la brújula que siempre me guía,",
      "tu mirada, el único cielo que quiero observar.",
      "",
      "Avanza, amor mío, sin miedo a la sombra,",
      "que cada recuerdo que toques se hará luz.",
      "Este es nuestro libro, nuestra obra maestra.",
      "",
      "Te amo, porque eres la magia que el mundo olvidó."
    ];

    const palabraSecretaPoema = "continuar";
    const passwordDeEtapa = "paginas"; 
  </script>

  <!-- INTRO ARENA / LIBRO -->
  <div id="arena-intro" style="display: none;">
    <button class="btn-saltar" onclick="saltarPoema()">Saltar</button>
    <canvas id="canvas-arena"></canvas>
    
    <div id="contenedor-poema">
        <div id="texto-poema"></div>
        <div id="input-continuar-box">
            <p style="margin-bottom: 15px; color: #f4c562; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;">Escribe <b style="color:#fff; text-transform: uppercase;">continuar</b> para adentrarte...</p>
            <input type="text" id="input-continuar" placeholder="..." autocomplete="off">
            <p id="error-continuar" style="color: #ff4757; font-size: 0.85rem; display: none; margin-top: 10px;">Palabra incorrecta...</p>
        </div>
    </div>
  </div>

  <div class="fondo-cueva"></div>
  <div class="respiracion"></div>

  <div class="header-hud">
    <div class="controles-izq">
      <button class="btn-accion-top" onclick="window.location.href='index.html'">←</button>
      <button class="btn-accion-top" onclick="forzarIntroArena()" title="Volver a leer">📜</button>
      
      <div style="margin-left: 8px;">
        <div class="subtitulo-seccion">Etapa 1</div>
        <h1 class="titulo-seccion">El Sendero</h1>
      </div>
    </div>
  </div>

  <!-- CÁMARA Y LIENZO DEL MAPA -->
  <div class="camara-viewport">
      <div id="lienzo-mapa">
        <svg id="svg-caminos"></svg>
        <div id="nodos-contenedor" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
      </div>
  </div>

<script>
  // -----------------------------------------------------
  // 0. LÓGICA DE CONTRASEÑA PRINCIPAL ("Paginas")
  // -----------------------------------------------------
  function iniciarSistema() {
      if (localStorage.getItem('acceso_concedido_etapa1') === 'true') {
          arrancarEtapa();
      } else {
          document.getElementById('pantalla-password').style.display = 'flex';
      }
  }

  function verificarPassword() {
      const input = document.getElementById('input-pass-puerta').value.toLowerCase().trim();
      if (input === passwordDeEtapa.toLowerCase()) {
          localStorage.setItem('acceso_concedido_etapa1', 'true');
          
          document.getElementById('pantalla-password').style.opacity = '0';
          setTimeout(() => {
              document.getElementById('pantalla-password').style.display = 'none';
              arrancarEtapa();
          }, 800);
      } else {
          const err = document.getElementById('error-pass-puerta');
          err.style.display = 'block';
          setTimeout(() => { err.style.display = 'none'; }, 2000);
      }
  }

  document.getElementById('input-pass-puerta').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verificarPassword();
  });


  // -----------------------------------------------------
  // 1. LÓGICA DE LA ARENA FORMANDO LAS LETRAS
  // -----------------------------------------------------
  let lineaIdx = 0;
  let charIdx = 0;
  let animacionArenaReq;
  let tipeoTimeout;
  
  // Arreglo para guardar las partículas mágicas de las letras
  let particulasLetras = []; 

  function arrancarEtapa() {
      chequearIntro();
      generarMapa();
  }

  function iniciarArenaVisual() {
      const canvas = document.getElementById('canvas-arena');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const particulasFondo = [];
      const cantidad = window.innerWidth < 600 ? 50 : 100;
      
      for(let i=0; i<cantidad; i++) {
          particulasFondo.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              r: Math.random() * 2 + 0.5,
              vx: (Math.random() * 1) - 0.5,
              vy: Math.random() * 1.5 + 0.5,
              opacidad: Math.random() * 0.4 + 0.1
          });
      }

      function dibujarArena() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Dibujar la arena de fondo que cae suave
          for(let i=0; i<particulasFondo.length; i++) {
              let p = particulasFondo[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(244, 197, 98, ${p.opacidad})`;
              ctx.fill();
              
              p.y += p.vy;
              p.x += Math.sin(p.y * 0.01) * 0.5 + p.vx;
              
              if(p.y > canvas.height) {
                  p.y = -10;
                  p.x = Math.random() * canvas.width;
              }
          }

          // DIBUJAR LA ARENA MÁGICA QUE FORMA LAS LETRAS
          for(let i = particulasLetras.length - 1; i >= 0; i--) {
              let pM = particulasLetras[i];
              
              // Se acercan rápidamente al centro de la letra
              pM.x += (pM.targetX - pM.x) * 0.25;
              pM.y += (pM.targetY - pM.y) * 0.25;
              pM.vida -= 0.08; // Desaparecen rápido al formar la letra

              ctx.beginPath();
              ctx.arc(pM.x, pM.y, pM.r, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(244, 197, 98, ${pM.vida})`;
              ctx.fill();

              if (pM.vida <= 0) {
                  particulasLetras.splice(i, 1);
              }
          }

          animacionArenaReq = requestAnimationFrame(dibujarArena);
      }
      dibujarArena();
  }

  // Función para disparar partículas que convergen en la letra
  function invocarArenaEnCoordenada(x, y) {
      for(let i = 0; i < 12; i++) {
          let angulo = Math.random() * Math.PI * 2;
          let radioDistancia = Math.random() * 30 + 15; // Nacen en un círculo alrededor
          
          particulasLetras.push({
              x: x + Math.cos(angulo) * radioDistancia,
              y: y + Math.sin(angulo) * radioDistancia,
              targetX: x,
              targetY: y,
              r: Math.random() * 2 + 1,
              vida: 1
          });
      }
  }

  function escribirPoema() {
      const textoPoema = document.getElementById('texto-poema');
      const contenedor = document.getElementById('contenedor-poema');
      
      if (lineaIdx < poemaLargo.length) {
          let lineaActual = poemaLargo[lineaIdx];
          
          if (charIdx < lineaActual.length) {
              let char = lineaActual.charAt(charIdx);
              
              // Creamos un <span> individual para cada letra
              let spanLetra = document.createElement('span');
              spanLetra.textContent = char === ' ' ? '\u00A0' : char; // Respetar espacios
              spanLetra.className = 'char-oculto'; 
              textoPoema.appendChild(spanLetra);

              // Si no es un espacio, activamos la magia
              if (char !== ' ') {
                  // Obtenemos la posición exacta en la pantalla donde se dibujará esta letra
                  let rect = spanLetra.getBoundingClientRect();
                  let centroX = rect.left + (rect.width / 2);
                  let centroY = rect.top + (rect.height / 2);
                  
                  // Lanzamos la arena hacia esas coordenadas
                  invocarArenaEnCoordenada(centroX, centroY);
                  
                  // Justo cuando la arena choca en el centro, la letra se revela (quita el blur)
                  setTimeout(() => {
                      spanLetra.className = 'char-visible';
                  }, 120);
              } else {
                  spanLetra.className = 'char-visible';
              }

              charIdx++;
              tipeoTimeout = setTimeout(escribirPoema, 70); // Velocidad al formar letras
          } else {
              textoPoema.appendChild(document.createElement('br'));
              charIdx = 0;
              lineaIdx++;
              tipeoTimeout = setTimeout(escribirPoema, 900); // Pausa dramática entre líneas
          }
      } else {
          setTimeout(mostrarInputPoema, 1000);
      }
      // Mantiene el scroll siempre abajo suavemente
      contenedor.scrollTop = contenedor.scrollHeight;
  }

  function mostrarInputPoema() {
      document.getElementById('input-continuar-box').style.display = 'block';
      const contenedor = document.getElementById('contenedor-poema');
      contenedor.scrollTop = contenedor.scrollHeight;
      document.getElementById('input-continuar').focus();
  }

  function saltarPoema() {
      clearTimeout(tipeoTimeout);
      const textoPoema = document.getElementById('texto-poema');
      // Si salta, mostramos todo el poema de golpe, sin animaciones por letra para evitar lag
      textoPoema.innerHTML = poemaLargo.join('<br>'); 
      mostrarInputPoema();
  }

  document.getElementById('input-continuar').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
          let valor = e.target.value.toLowerCase().trim();
          if (valor === palabraSecretaPoema) {
              localStorage.setItem('intro_cueva_vista', 'true');
              document.getElementById('arena-intro').style.opacity = '0';
              setTimeout(() => {
                  document.getElementById('arena-intro').style.display = 'none';
                  cancelAnimationFrame(animacionArenaReq);
              }, 1500);
          } else {
              const err = document.getElementById('error-continuar');
              err.style.display = 'block';
              setTimeout(() => { err.style.display = 'none'; }, 2000);
          }
      }
  });

  function forzarIntroArena() {
      localStorage.removeItem('intro_cueva_vista');
      location.reload();
  }

  function chequearIntro() {
      if(localStorage.getItem('intro_cueva_vista') !== 'true') {
          document.getElementById('arena-intro').style.display = 'flex';
          iniciarArenaVisual();
          // Retrasamos un segundo antes de empezar a dibujar las letras
          setTimeout(escribirPoema, 1500); 
      }
  }

  // -----------------------------------------------------
  // 2. LÓGICA DEL MAPA Y LA CÁMARA
  // -----------------------------------------------------
  const nombresNiveles = [
      "( reloj )",       
      "( preguntas )",   
      "( memoria )",     
      "",                
      "",                
      "",                
      "",                
      "",                
      "",                
      "( nuestro libro )"
  ];
  const totalNiveles = 10;
  
  let nivelReal = parseInt(localStorage.getItem('progreso_camii_cueva')) || 1; 
  let nivelVisual = parseInt(localStorage.getItem('progreso_visual_cueva')) || nivelReal;

  function generarMapa() {
    const contenedor = document.getElementById('nodos-contenedor');
    contenedor.innerHTML = ''; 
    
    for (let i = 1; i <= totalNiveles; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'nodo-wrapper';
      wrapper.id = 'nodo-' + i;
      
      if (i <= nivelVisual) {
          wrapper.classList.add('desbloqueado');
      }
      
      const desplazamientoX = Math.sin(i * 1.3) * 85; 
      wrapper.style.transform = wrapper.classList.contains('desbloqueado') 
        ? `translateX(${desplazamientoX}px) scale(1)` 
        : `translateX(${desplazamientoX}px) scale(0.5)`;

      wrapper.innerHTML = `
        <div class="orbe-nivel" id="orbe-${i}" onclick="tocarNivel(${i})">
          <span class="numero-nivel">${i}</span>
        </div>
        <div class="titulo-nodo">${nombresNiveles[i-1]}</div>
      `;
      contenedor.appendChild(wrapper);
    }

    setTimeout(dibujarCaminos, 100);
    setTimeout(() => enfocarCamara(nivelVisual, false), 200); 
    setTimeout(verificarAnimacionPendiente, 1000); 
  }

  function enfocarCamara(numNodo, animar = true) {
      const lienzo = document.getElementById('lienzo-mapa');
      const nodo = document.getElementById('nodo-' + numNodo);
      if(!nodo) return;

      const centroPantalla = window.innerHeight / 2;
      const centroNodo = nodo.offsetTop + (nodo.offsetHeight / 2);
      const desplazamientoY = centroPantalla - centroNodo;

      lienzo.style.transition = animar ? 'transform 1.5s cubic-bezier(0.4, 0.0, 0.2, 1)' : 'none';
      lienzo.style.transform = `translateY(${desplazamientoY}px)`;
  }

  function dibujarCaminos() {
      const svg = document.getElementById('svg-caminos');
      const lienzo = document.getElementById('lienzo-mapa');
      
      svg.setAttribute('height', lienzo.scrollHeight);
      svg.innerHTML = ''; 

      for (let i = 1; i < totalNiveles; i++) {
          const nodoA = document.getElementById(`orbe-${i}`);
          const nodoB = document.getElementById(`orbe-${i+1}`);

          const rectA = nodoA.getBoundingClientRect();
          const rectB = nodoB.getBoundingClientRect();
          const lienzoRect = lienzo.getBoundingClientRect();

          const x1 = (rectA.left - lienzoRect.left) + (rectA.width / 2);
          const y1 = (rectA.top - lienzoRect.top) + (rectA.height / 2);
          const x2 = (rectB.left - lienzoRect.left) + (rectB.width / 2);
          const y2 = (rectB.top - lienzoRect.top) + (rectB.height / 2);

          const controlY = (y1 + y2) / 2;
          const pathD = `M ${x1} ${y1} C ${x1} ${controlY}, ${x2} ${controlY}, ${x2} ${y2}`;

          const caminoActivo = document.createElementNS("http://www.w3.org/2000/svg", "path");
          caminoActivo.setAttribute("d", pathD);
          caminoActivo.setAttribute("class", "camino-activo");
          caminoActivo.id = `camino-animado-${i}`;
          
          const longitud = 500; 
          caminoActivo.style.strokeDasharray = longitud;
          
          if (i < nivelVisual) {
              caminoActivo.style.strokeDashoffset = "0";
          } else {
              caminoActivo.style.strokeDashoffset = longitud;
          }
          
          svg.appendChild(caminoActivo);
      }
  }

  function verificarAnimacionPendiente() {
      if (nivelReal > nivelVisual) {
          const nodoSiguiente = nivelVisual + 1;
          const camino = document.getElementById(`camino-animado-${nivelVisual}`);
          const elementoSiguiente = document.getElementById(`nodo-${nodoSiguiente}`);
          
          if(camino && elementoSiguiente) {
              camino.style.strokeDashoffset = "0";
              
              setTimeout(() => {
                  enfocarCamara(nodoSiguiente, true);
              }, 500);

              setTimeout(() => {
                  elementoSiguiente.classList.add('desbloqueado');
                  nivelVisual = nodoSiguiente;
                  localStorage.setItem('progreso_visual_cueva', nivelVisual);
                  
                  setTimeout(verificarAnimacionPendiente, 1000);
              }, 2000); 
          }
      }
  }

  window.addEventListener('resize', () => {
      dibujarCaminos();
      enfocarCamara(nivelVisual, false); 
  });

  function tocarNivel(num) {
    if (num > nivelVisual) return;

    switch(num) {
      case 1: alert("Abriendo ( reloj )..."); break;
      case 2: alert("Abriendo ( preguntas )..."); break;
      case 3: alert("Abriendo ( memoria )..."); break;
      case 10: alert("Abriendo ( nuestro libro )..."); break;
      default:
        alert("Este misterio (" + num + ") aún está oculto en la arena...");
    }
  }

  window.onload = () => { 
      iniciarSistema();
  };
</script>
