<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magia para mi Cachetoncita</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030303; 
            font-family: 'Times New Roman', Times, serif; 
            color: white;
            user-select: none;
        }

        /* --- Lienzo de Partículas --- */
        #canvas-particulas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; 
        }

        /* --- INTERFAZ (UI) --- */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            z-index: 10; 
            pointer-events: none; 
            padding-bottom: 50px;
        }

        /* Botón de regreso a la Etapa 1 */
        .btn-regreso {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .btn-regreso:hover {
            color: white;
            border-color: #8e2de2;
            box-shadow: 0 0 15px rgba(142, 45, 226, 0.5);
            background: rgba(142, 45, 226, 0.1);
        }

        /* Caja de texto visible y bonita */
        #input-magico {
            pointer-events: auto; 
            background: rgba(142, 45, 226, 0.2);
            border: 2px solid #8e2de2;
            color: white;
            font-size: 1.5rem;
            padding: 15px;
            text-align: center;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            outline: none;
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.4);
            margin-bottom: 20px;
            transition: box-shadow 0.3s;
        }

        #input-magico:focus {
            box-shadow: 0 0 40px rgba(142, 45, 226, 0.8);
        }

        #indicacion {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            opacity: 0.7;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(142, 45, 226, 0.3);
        }

        /* Botón Morado Final */
        #btn-shorts {
            display: none;
            pointer-events: auto;
            padding: 18px 45px;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #8e2de2, #4a00e0);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(142, 45, 226, 0.8);
            margin-bottom: 50px;
            z-index: 20;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s;
        }

        #btn-shorts:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(142, 45, 226, 1);
        }

        /* --- MENSAJE LARGO FINAL --- */
        #modal-mensaje {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #8e2de2;
            padding: 40px;
            border-radius: 20px;
            color: white;
            text-align: center;
            width: 85%;
            max-width: 550px;
            display: none; 
            z-index: 100; 
            pointer-events: auto;
            box-shadow: 0 0 60px rgba(142, 45, 226, 0.4); 
        }

        #modal-texto {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
            font-style: italic;
            color: #eee;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        .btn-cerrar-modal {
            background: #8e2de2; 
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .btn-cerrar-modal:hover {
            background: #a044ff;
            box-shadow: 0 0 15px rgba(142, 45, 226, 0.6);
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <a href="etapa1.html" class="btn-regreso">⬅ Volver a la Etapa 1</a>

        <div id="indicacion">Escribe palabras como "linda" o la palabra secreta...</div>
        <input type="text" id="input-magico" placeholder="Escribe aquí..." autocomplete="off">
        <button id="btn-shorts">DESBLOQUEAR SHORTS</button>
    </div>

    <div id="modal-mensaje">
        <p id="modal-texto"></p>
        <button class="btn-cerrar-modal" onclick="cerrarModal()">Continuar</button>
    </div>

    <canvas id="canvas-particulas"></canvas>

    <script>
        const canvas = document.getElementById('canvas-particulas');
        const ctx = canvas.getContext('2d');
        const inputMagico = document.getElementById('input-magico');
        const btnShorts = document.getElementById('btn-shorts');
        const modal = document.getElementById('modal-mensaje');
        const modalTexto = document.getElementById('modal-texto');

        let width, height, particulas = [];
        let modoFuego = false;

        // Base de datos de mensajes
        const MENSAJES = {
            "linda": "Eres la persona más especial que he conocido. No es solo cómo te ves (que es increíble), sino cómo haces sentir a los que te rodean. Tienes una luz propia.",
            "hermosa": "No hay palabras suficientes en el diccionario para describir lo hermosa que eres. No es solo lo físico, que es perfecto, es la luz que irradias, tu bondad y la forma en que ves el mundo.",
            "perfecta": "Sé que nadie es perfecto, pero para mis ojos, tú eres lo más cercano a la perfección que existe en este mundo. Eres simplemente maravillosa, por dentro y por fuera.",
            "cachetoncita": "¡Mi Amor, eres la Cachetoncita más HERMOSA del universo! Tu sonrisa ilumina mis días, tu dulzura me cautiva y cada momento contigo es un regalo precioso. Te amo infinitamente."
        };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particulas = [];
            for (let i = 0; i < 1200; i++) {
                particulas.push(new Particula());
            }
        }

        class Particula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x; 
                this.baseY = this.y; 
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.tamaño = Math.random() * 2 + 1;
                this.color = 'white';
                this.idOffset = Math.random() * 1000; 
                this.enUso = false; 
                
                this.vida = Math.random() * 100;
            }

            dibujar() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            actualizar() {
                if (modoFuego) {
                    this.y -= 1.5 + Math.random() * 1.5;
                    this.x += Math.sin(Date.now() * 0.005 + this.idOffset) * 1;
                    
                    this.vida -= 1;
                    
                    if (this.vida > 70) this.color = 'rgba(181, 126, 237, 0.8)'; 
                    else if (this.vida > 40) this.color = 'rgba(142, 45, 226, 0.8)'; 
                    else this.color = 'rgba(74, 0, 224, 0.4)'; 
                    
                    this.tamaño = Math.max(0.1, (this.vida / 100) * 3);

                    if (this.vida <= 0 || this.tamaño <= 0.2) {
                        this.x = (width / 2) + (Math.random() - 0.5) * 200;
                        this.y = height + 10;
                        this.vida = 100;
                        this.tamaño = Math.random() * 2 + 1;
                    }

                } else if (this.enUso) {
                    let dxDestino = this.baseX - this.x;
                    let dyDestino = this.baseY - this.y;
                    this.x += dxDestino * 0.08; 
                    this.y += dyDestino * 0.08;
                    this.color = 'white';
                } else {
                    this.x += Math.sin(Date.now() * 0.001 + this.idOffset) * 0.5;
                    this.y += Math.cos(Date.now() * 0.001 + this.idOffset) * 0.5;
                    
                    if (this.y > height - 150) {
                        this.color = 'rgba(255, 255, 255, 0.1)'; 
                    } else {
                        this.color = 'rgba(255, 255, 255, 0.4)'; 
                    }
                }

                this.dibujar();
            }
        }

        function generarPuntosDeTexto(texto) {
            particulas.forEach(p => p.enUso = false);

            if (texto === "") return;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            const fontSize = Math.min(width / (texto.length * 0.7), 150); 
            
            tempCtx.fillStyle = "white";
            tempCtx.font = `bold ${fontSize}px Arial`;
            tempCtx.textAlign = "center";
            tempCtx.textBaseline = "middle";
            tempCtx.fillText(texto, width / 2, height / 2.5);

            const imageData = tempCtx.getImageData(0, 0, width, height).data;
            let coordenadasTexto = [];

            const salto = 4; 
            for (let y = 0; y < height; y += salto) {
                for (let x = 0; x < width; x += salto) {
                    const index = (y * width + x) * 4;
                    const alpha = imageData[index + 3]; 
                    
                    if (alpha > 128) { 
                        coordenadasTexto.push({ x: x, y: y });
                    }
                }
            }

            coordenadasTexto.sort(() => Math.random() - 0.5);

            for (let i = 0; i < coordenadasTexto.length; i++) {
                if (i < particulas.length) {
                    particulas[i].baseX = coordenadasTexto[i].x;
                    particulas[i].baseY = coordenadasTexto[i].y;
                    particulas[i].enUso = true; 
                }
            }
        }

        function activarFuegoYMensajeFinal() {
            modoFuego = true;
            inputMagico.style.display = 'none';
            document.getElementById('indicacion').style.display = 'none';
            
            particulas.forEach(p => {
                p.vy = (Math.random() * -5) - 2;
                p.vx = (Math.random() * 10) - 5;
            });

            setTimeout(() => {
                mostrarMensaje(MENSAJES["cachetoncita"]);
            }, 1000);

            setTimeout(() => {
                btnShorts.style.display = 'block';
            }, 3000); 
        }

        function mostrarMensaje(texto) {
            modalTexto.innerText = texto;
            modal.style.display = 'block';
            inputMagico.blur(); 
        }

        function cerrarModal() {
            modal.style.display = 'none';
            if (!modoFuego) {
                inputMagico.value = '';
                generarPuntosDeTexto('');
                inputMagico.focus();
            }
        }

        inputMagico.addEventListener('input', (e) => {
            const val = e.target.value;
            const lowVal = val.toLowerCase().trim();

            if (modoFuego) return;

            generarPuntosDeTexto(val);

            if (MENSAJES[lowVal]) {
                setTimeout(() => mostrarMensaje(MENSAJES[lowVal]), 800);
            }

            if (lowVal === 'cachetoncita') {
                setTimeout(activarFuegoYMensajeFinal, 1200); 
            }
        });

        // Evento de redirección al archivo Index.html
        btnShorts.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            particulas.forEach(p => {
                p.actualizar();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);

        init();
        animate();
        setTimeout(() => inputMagico.focus(), 500);

    </script>
</body>
</html>
