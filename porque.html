<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Árbol de Nuestro Amor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Satisfy&family=Montserrat:wght@300;400;600&display=swap');

  /* QUITAMOS EL TOUCH-ACTION DE AQUÍ PARA NO BLOQUEAR LA LISTA */
  * { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    user-select: none; 
  }
  
  /* BLOQUEO TOTAL DE PANTALLA SOLO EN EL FONDO */
  body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: #050505; 
    font-family: 'Montserrat', sans-serif; 
    overflow: hidden; color: white;
    position: fixed; 
    touch-action: none; /* El fondo no se mueve */
  }

  /* EFECTO DE RESPIRACIÓN (MÍSTICO) */
  .respiracion {
    position: absolute; top: 50%; left: 50%; width: 150vw; height: 150vw; margin-top: -75vw; margin-left: -75vw;
    background: radial-gradient(circle, rgba(30, 58, 138, 0.25) 0%, rgba(142, 36, 170, 0.15) 25%, rgba(0,0,0,0) 60%);
    pointer-events: none; z-index: 0; animation: respirar 8s ease-in-out infinite;
  }
  @keyframes respirar { 
    0%, 100% { transform: scale(0.8); opacity: 0.3; } 
    50% { transform: scale(1.1); opacity: 0.8; } 
  }

  /* VELO DE SEGURIDAD */
  #velo-negro {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 9999; opacity: 1; transition: opacity 0.8s; pointer-events: none;
  }
  #velo-negro.oculto { opacity: 0; }

  /* BOTONES SUPERIORES */
  .btn-volver, .btn-recuerdos {
    position: absolute; top: 20px; padding: 10px 15px; border-radius: 30px;
    background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer; z-index: 100; backdrop-filter: blur(5px); font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
    transition: 0.3s;
  }
  .btn-volver { left: 15px; }
  .btn-recuerdos { right: 15px; border-color: rgba(0,229,255,0.5); color: #00e5ff; }
  .btn-volver:active, .btn-recuerdos:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

  /* --- UI CLAVADA --- */
  .seccion-titulos {
    position: absolute; top: 12%; width: 100%; text-align: center; z-index: 10; pointer-events: none;
  }
  .titulo {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.2rem;
    color: #e0f7fa; text-shadow: 0 0 15px rgba(0,229,255,0.5); margin-bottom: 5px;
  }
  .subtitulo { font-size: 0.9rem; color: #b3e5fc; letter-spacing: 2px; text-transform: uppercase; }

  .seccion-nube {
    position: absolute; top: 25%; width: 100%; text-align: center; z-index: 10; pointer-events: none;
  }
  .nube { font-size: 4rem; filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); }
  .temporizador {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; font-size: 0.85rem; padding: 8px 0;
    margin: 10px auto 0 auto; 
    width: 260px; display: block; font-family: monospace; font-variant-numeric: tabular-nums;
  }
  .gota-lista { color: #00e5ff; font-weight: bold; animation: titilar 1.5s infinite; }
  @keyframes titilar { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* CANVAS DEL ÁRBOL */
  #canvas-arbol {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: pointer;
    touch-action: none; /* Aquí sí bloqueamos para que los toques no muevan la pantalla */
  }

  /* MODAL DE LA HOJA (CUANDO CAE LA GOTA) */
  #modal-hoja {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; visibility: hidden; transition: 0.5s ease;
  }
  #modal-hoja.activo { opacity: 1; visibility: visible; }

  .hoja-papel {
    width: 85%; max-width: 380px; background: linear-gradient(135deg, #4caf50 0%, #1b5e20 100%);
    border-radius: 0 120px 0 120px; padding: 50px 35px; text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.1);
    border: 2px solid #81c784; transform: scale(0.5) rotate(-20deg); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2);
  }
  #modal-hoja.activo .hoja-papel { transform: scale(1) rotate(0deg); }
  
  .subtitulo-hoja {
    font-family: 'Montserrat', sans-serif; font-size: 1.1rem; color: #b2ff59; font-weight: 600; 
    margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .texto-razon {
    font-family: 'Satisfy', cursive; font-size: 1.6rem; color: #fffdf5; line-height: 1.4; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .btn-accion {
    margin-top: 25px; background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 10px 25px;
    border-radius: 20px; font-family: 'Montserrat', sans-serif; cursor: pointer; font-weight: bold; transition: 0.3s;
  }
  .btn-accion:active { background: rgba(255,255,255,0.2); }

  /* --- MODAL DE RECUERDOS --- */
  #modal-recuerdos {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 150; opacity: 0; visibility: hidden; transition: 0.4s ease;
    touch-action: auto; /* Permite interacciones dentro del modal */
  }
  #modal-recuerdos.activo { opacity: 1; visibility: visible; }

  .caja-recuerdos {
    width: 90%; max-width: 400px; max-height: 80vh;
    background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 20px; padding: 25px; display: flex; flex-direction: column;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
    transform: scale(0.9); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #modal-recuerdos.activo .caja-recuerdos { transform: scale(1); }

  .titulo-recuerdos {
    font-family: 'Playfair Display', serif; font-style: italic; color: #00e5ff;
    text-align: center; margin-top: 0; font-size: 1.6rem; margin-bottom: 20px;
  }

  /* LISTA DESBLOQUEADA PARA SCROLL FLUIDO */
  #lista-recuerdos {
    overflow-y: auto; 
    flex-grow: 1; 
    margin-bottom: 20px; 
    padding-right: 5px;
    touch-action: pan-y !important; /* Fuerza permiso de scroll vertical */
    overscroll-behavior: contain; /* Evita que el scroll se pase al fondo */
    -webkit-overflow-scrolling: touch; /* Suavidad en iPhone */
  }
  
  #lista-recuerdos::-webkit-scrollbar { width: 5px; }
  #lista-recuerdos::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.5); border-radius: 10px; }

  .item-recuerdo {
    background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 12px;
    font-family: 'Satisfy', cursive; font-size: 1.3rem; line-height: 1.4; color: #e0f7fa;
    border-left: 3px solid #d500f9;
    touch-action: pan-y !important; /* También en los items por si acaso */
  }
  .mensaje-vacio { text-align: center; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; color: #aaa; margin-top: 30px; }

</style>
</head>
<body>

  <div id="velo-negro"></div>
  <div class="respiracion"></div>

  <button class="btn-volver" onclick="volver()">← Volver</button>
  <button class="btn-recuerdos" onclick="abrirRecuerdos()">📖 Recuerdos</button>

  <div class="seccion-titulos">
    <div class="titulo">Razones por las que te amo</div>
    <div class="subtitulo">Toca para nutrir nuestro árbol</div>
  </div>

  <div class="seccion-nube">
    <div class="nube">☁️</div>
    <div class="temporizador gota-lista" id="timer-display">¡Gota lista! Toca el árbol</div>
  </div>

  <canvas id="canvas-arbol"></canvas>

  <div id="modal-hoja">
    <div class="hoja-papel">
      <div class="subtitulo-hoja">Te amo</div>
      <div class="texto-razon" id="texto-razon">...</div>
      <button class="btn-accion" onclick="cerrarHoja()">Ver cómo crece</button>
    </div>
  </div>

  <div id="modal-recuerdos">
    <div class="caja-recuerdos">
      <h3 class="titulo-recuerdos">Razones Descubiertas</h3>
      <div id="lista-recuerdos">
        </div>
      <button class="btn-accion" style="border-color:#00e5ff; color:#00e5ff; margin-top:0;" onclick="cerrarRecuerdos()">Cerrar</button>
    </div>
  </div>

<script>
  const razones = [
    "Por la inmensa paz que me das cuando el mundo parece un caos. Contigo todo es más fácil.",
    "Porque a tu lado siento que puedo ser yo mismo, sin miedos y sin esconder nada.",
    "Por la forma en la que me miras. Haces que me sienta el hombre más especial del universo.",
    "Porque me inspiras a ser una mejor persona cada día para darte el futuro que mereces.",
    "Por tu sonrisa. Es capaz de iluminar hasta mis días más grises y pesados.",
    "Por lo mucho que valoras a tu familia. Ese corazón tan noble me enamora.",
    "Porque escuchar tu voz me da una tranquilidad que no encuentro en ningún otro lugar.",
    "Por tu ternura y por cómo me haces sentir cuidado y amado en cada pequeño detalle.",
    "Porque me enseñaste que el amor de verdad se basa en el respeto, la paciencia y el apoyo.",
    "Por lo hermosa que eres por dentro y por fuera. Eres arte, mi Camí."
  ];

  let isDropReady = true; 
  let nextReadyTime = 0;
  let treeLevel = 0;

  let currentLen = 0; let currentDepth = 0; let currentGrosor = 0;
  let targetLen = 25; let targetDepth = 1; let targetGrosor = 3;

  function cargarProgreso() {
      const dataGuardada = JSON.parse(localStorage.getItem('arbol_fractal_camii'));
      if (dataGuardada) {
          treeLevel = dataGuardada.treeLevel;
          targetLen = dataGuardada.targetLen;
          targetDepth = dataGuardada.targetDepth;
          targetGrosor = dataGuardada.targetGrosor;
          nextReadyTime = dataGuardada.nextReadyTime;

          if (Date.now() < nextReadyTime) isDropReady = false;
      }
  }

  function guardarProgreso() {
      const data = {
          treeLevel: treeLevel,
          targetLen: targetLen,
          targetDepth: targetDepth,
          targetGrosor: targetGrosor,
          nextReadyTime: nextReadyTime
      };
      localStorage.setItem('arbol_fractal_camii', JSON.stringify(data));
  }

  cargarProgreso();

  function actualizarTimer() {
    if (isDropReady) {
        document.getElementById('timer-display').innerHTML = "¡Gota lista! Toca el árbol";
        document.getElementById('timer-display').className = "temporizador gota-lista";
        return;
    }
    const faltan = nextReadyTime - Date.now();
    const txt = document.getElementById('timer-display');

    if (faltan <= 0) {
        isDropReady = true;
        txt.innerHTML = "¡Gota lista! Toca el árbol";
        txt.className = "temporizador gota-lista";
        guardarProgreso(); 
    } else {
        const min = Math.floor((faltan % (1000 * 60 * 60)) / (1000 * 60));
        const seg = Math.floor((faltan % (1000 * 60)) / 1000).toString().padStart(2, '0');
        txt.innerHTML = `Próxima gota en: ${min}m ${seg}s`;
        txt.className = "temporizador";
    }
  }
  setInterval(actualizarTimer, 1000);

  const canvas = document.getElementById('canvas-arbol');
  const ctx = canvas.getContext('2d');
  let width, height;
  let dropAnim = { active: false, y: 0 };

  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  function dibujarGota() {
    if (!dropAnim.active) return;
    ctx.beginPath(); ctx.arc(width / 2, dropAnim.y, 14, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 229, 255, 0.2)'; ctx.fill();
    ctx.beginPath(); ctx.arc(width / 2, dropAnim.y, 6, 0, Math.PI * 2); ctx.fillStyle = '#00e5ff'; ctx.fill();
    dropAnim.y += 18;
    if (dropAnim.y > height - 100) { dropAnim.active = false; crecerArbol(); }
  }

  function dibujarRama(startX, startY, len, angle, depth, grosor) {
    ctx.save(); ctx.translate(startX, startY); ctx.rotate(angle * Math.PI / 180);
    let actualLen = (depth > 0 && depth < 1) ? len * depth : len;

    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -actualLen);
    ctx.strokeStyle = `rgba(213, 0, 249, ${0.4 + (depth/10)})`;
    ctx.lineWidth = grosor; ctx.lineCap = 'round'; ctx.stroke();

    if (depth > 1) {
      dibujarRama(0, -actualLen, len * 0.78, angle - 22, depth - 1, grosor * 0.7);
      dibujarRama(0, -actualLen, len * 0.78, angle + 22, depth - 1, grosor * 0.7);
    } else if (depth > 0) {
      ctx.beginPath(); ctx.arc(0, -actualLen, 8 * depth, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 229, 255, 0.2)'; ctx.fill();
      ctx.beginPath(); ctx.arc(0, -actualLen, 3 * depth, 0, Math.PI * 2); ctx.fillStyle = '#00e5ff'; ctx.fill();
    }
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, width, height);
    currentLen += (targetLen - currentLen) * 0.03;
    currentDepth += (targetDepth - currentDepth) * 0.03;
    currentGrosor += (targetGrosor - currentGrosor) * 0.03;

    let zoomOut = Math.max(0.15, 600 / (600 + (currentLen * 2.5)));

    ctx.save();
    ctx.translate(width / 2, height - 100); 
    ctx.scale(zoomOut, zoomOut);
    dibujarRama(0, 0, currentLen, 0, currentDepth, currentGrosor);
    ctx.restore();

    dibujarGota();
    requestAnimationFrame(render);
  }

  canvas.addEventListener('click', () => {
    // Evita clics si algún modal está abierto
    if(document.getElementById('modal-recuerdos').classList.contains('activo') || 
       document.getElementById('modal-hoja').classList.contains('activo')) return;

    if (!isDropReady || dropAnim.active) {
        if (!isDropReady) alert("Mi niña dinda, el arbolito está asimilando todo el amor. Espera a que la nubecita cargue la próxima gota. ♥️");
        return;
    }
    isDropReady = false; 
    document.getElementById('timer-display').className = "temporizador";
    dropAnim.y = height * 0.25; 
    dropAnim.active = true;
  });

  function crecerArbol() {
    treeLevel++;
    targetLen += 12; targetGrosor += 0.8;
    if (treeLevel % 2 === 0 && targetDepth < 7) targetDepth += 1; 

    guardarProgreso(); 
    setTimeout(() => {
        document.getElementById('texto-razon').innerText = razones[(treeLevel - 1) % razones.length];
        document.getElementById('modal-hoja').classList.add('activo');
    }, 200);
  }

  function cerrarHoja() {
    document.getElementById('modal-hoja').classList.remove('activo');
    const baseMinutos = 5 * 60 * 1000;
    const variacionAleatoria = Math.floor(Math.random() * 120000) - 60000;
    nextReadyTime = Date.now() + (baseMinutos + variacionAleatoria);
    guardarProgreso(); 
    actualizarTimer();
  }

  // --- LÓGICA DE LA GALERÍA DE RECUERDOS ---
  function abrirRecuerdos() {
    const contenedorLista = document.getElementById('lista-recuerdos');
    contenedorLista.innerHTML = ''; // Limpiar lista

    if (treeLevel === 0) {
        contenedorLista.innerHTML = '<div class="mensaje-vacio">Aún no has regado el arbolito. ¡Déjale caer una gota para descubrir tu primera carta! ♥️</div>';
    } else {
        // Generar las cartas basándose en el nivel del árbol
        for (let i = 0; i < treeLevel; i++) {
            let indiceFrase = i % razones.length;
            contenedorLista.innerHTML += `<div class="item-recuerdo">${razones[indiceFrase]}</div>`;
        }
    }
    document.getElementById('modal-recuerdos').classList.add('activo');
  }

  function cerrarRecuerdos() {
    document.getElementById('modal-recuerdos').classList.remove('activo');
  }

  function volver() {
    document.getElementById('velo-negro').classList.remove('oculto');
    setTimeout(() => { window.location.href = 'ajedrez.html?p=menu'; }, 600);
  }

  window.onload = () => {
    render();
    setTimeout(() => document.getElementById('velo-negro').classList.add('oculto'), 500);
  };
</script>
</body>
</html>
