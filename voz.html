<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voz - El Aliento</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap');

  * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #16080b 0%, #0a0506 100%);
    font-family: 'Poppins', sans-serif; overflow: hidden; color: white;
  }

  /* BOTÓN VOLVER */
  .btn-volver {
    position: absolute; top: 20px; left: 20px; padding: 12px 24px; border-radius: 30px;
    background: rgba(255, 71, 87, 0.1); color: #ffb8bf; border: 1px solid rgba(255, 71, 87, 0.3);
    cursor: pointer; z-index: 1000; backdrop-filter: blur(5px); font-family: 'Poppins', sans-serif; font-size: 0.85rem; transition: 0.4s;
  }
  .btn-volver:active { background: rgba(255, 71, 87, 0.3); border-color: #ff4757; transform: scale(0.95); }

  /* INTERFAZ INICIO */
  #ui-inicio {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10, 5, 6, 0.95); z-index: 500; transition: opacity 1s; padding: 20px;
  }
  .titulo-inicio {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.5rem;
    color: #ff4757; text-shadow: 0 0 20px rgba(255, 71, 87, 0.5); margin-bottom: 20px; text-align: center;
  }
  .btn-conectar {
    background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); border: none; color: #fff; padding: 15px 40px;
    border-radius: 30px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1rem;
    cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: 0.3s;
  }

  /* FEEDBACK DE SOPLIDO */
  #instruccion {
    position: absolute; top: 15%; width: 100%; text-align: center; font-weight: 500;
    font-size: 1.1rem; color: #ffb8bf; letter-spacing: 1px; z-index: 100;
    opacity: 0; transition: opacity 1s; pointer-events: none;
  }
  #feedback-soplido {
    position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
    width: 60%; height: 8px; background: rgba(255, 71, 87, 0.1);
    border-radius: 10px; z-index: 100; opacity: 0; transition: opacity 0.5s;
    border: 1px solid rgba(255, 71, 87, 0.3); overflow: hidden;
  }
  #progreso-fill { height: 100%; width: 0%; background: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.8); transition: width 0.1s; }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

  /* --- MÓDULO VISUAL CORAZÓN --- */
  #escenario-magico {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 50; display: none; opacity: 0; transition: opacity 1.5s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* EL GRAN CORAZÓN LATIENDO */
  #gran-corazon {
    font-size: 8rem; color: #ff4757; text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
    cursor: pointer; transition: transform 0.2s;
    animation: latirFuerte 1.5s infinite; z-index: 60;
  }
  @keyframes latirFuerte {
    0% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
  }

  /* PARTICULAS DOM */
  .particula-explosion {
    position: absolute; font-size: 1.5rem; color: #ff4757;
    pointer-events: none; z-index: 55; opacity: 1;
    transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1.5s ease-in;
  }

  /* TEXTO FLOTANTE (POEMA) */
  #contenedor-texto {
    position: absolute; top: 20%; width: 90%; text-align: center;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 65;
  }
  
  .linea-poema { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }

  .palabra {
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.2rem;
    color: #fff; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
    opacity: 0; transform: scale(0.5);
  }
  .palabra.visible {
    transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
    opacity: 1; transform: scale(1);
  }

  /* BOTÓN REGRESAR */
  #btn-regresar {
    position: absolute; bottom: 8%; padding: 15px 40px; border-radius: 30px;
    background: transparent; border: 1px solid #ff4757; color: #ffb8bf;
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.9rem;
    cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
    box-shadow: 0 0 15px rgba(255, 71, 87, 0.2); backdrop-filter: blur(5px);
    opacity: 0; pointer-events: none; transition: all 1s ease; z-index: 1000;
  }
  #btn-regresar.visible { opacity: 1; pointer-events: auto; background: rgba(255, 71, 87, 0.1); }
</style>
</head>
<body oncontextmenu="return false;">

  <button class="btn-volver" onclick="window.location.href='etapa1.html'">← Volver</button>

  <div id="ui-inicio">
    <div class="titulo-inicio">El Aliento</div>
    <p style="text-align: center; width: 85%; margin-bottom: 50px; color: #ffb8bf; font-size: 0.95rem; line-height: 1.6;">
      Mi niña hemocha... Sopla suavemente hacia tu celular para despejar la bruma y encontrar mi corazón.<br><br>(Permite el acceso al micrófono) ♥️
    </p>
    <button class="btn-conectar" onclick="iniciarMagiaVoz()">Soplar</button>
  </div>

  <div id="instruccion">Acércate y sopla con amor...</div>
  <div id="feedback-soplido"><div id="progreso-fill"></div></div>

  <canvas id="canvas-humo"></canvas>

  <div id="escenario-magico">
    <div id="contenedor-texto"></div>
    <div id="gran-corazon" onclick="explotarCorazon()">♥️</div>
    <button id="btn-regresar" onclick="completarMisterio()">Regresar al Mapa</button>
  </div>

<script>
  let audioContext, analyser, microphone, dataArray;
  let tiempoSoplando = 0; 
  const tiempoObjetivoSoplido = 3; 
  let permisoMicro = false;

  const canvas = document.getElementById('canvas-humo');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particulasHumo = [];
  let estadoEscuchando = false;

  // NUEVO POEMA
  const lineasPoema = [
    "Tu voz es mi melodía favorita,",
    "el susurro que calma mi alma,",
    "y el aliento que le da vida",
    "a mi mundo entero.",
    "Nunca dejes de hablarme,",
    "porque en tus palabras",
    "siempre encuentro mi hogar.",
    "Te amo, mi cachetona."
  ];

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class HumoFrontal {
    constructor() {
      this.x = width / 2 + (Math.random() - 0.5) * 100;
      this.y = height / 2 + (Math.random() - 0.5) * 100;
      this.vx = (Math.random() - 0.5) * 6;
      this.vy = (Math.random() - 0.5) * 6;
      this.size = Math.random() * 20 + 10; 
      this.life = 1.0; 
    }
    dibujar() {
      if (this.life <= 0) return;
      ctx.globalAlpha = this.life * 0.3; 
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4757'; // Humo romántico
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    actualizar() {
      this.x += this.vx; this.y += this.vy;
      this.size += 6; 
      this.life -= 0.02; 
    }
  }

  function renderHumo() {
    ctx.clearRect(0, 0, width, height);

    if (analyser && permisoMicro && estadoEscuchando) {
      analyser.getByteFrequencyData(dataArray);
      let sumaBajas = 0; for(let i = 1; i < 20; i++) sumaBajas += dataArray[i];
      let promedioBajas = sumaBajas / 19;
      let sumaMediasAltas = 0; for(let i = 50; i < 100; i++) sumaMediasAltas += dataArray[i];
      let promedioMediasAltas = sumaMediasAltas / 50;

      if (promedioBajas > 120 && promedioBajas > promedioMediasAltas * 1.5) {
        document.getElementById('feedback-soplido').style.opacity = '1';
        tiempoSoplando += 0.016; 
        document.getElementById('progreso-fill').style.width = ((tiempoSoplando / tiempoObjetivoSoplido) * 100) + '%';

        particulasHumo.push(new HumoFrontal());

        if (tiempoSoplando >= tiempoObjetivoSoplido) {
          estadoEscuchando = false;
          revelarEscenarioPremium();
        }
      }
    }

    particulasHumo.forEach((p, index) => {
      p.actualizar(); p.dibujar();
      if (p.life <= 0) particulasHumo.splice(index, 1);
    });

    requestAnimationFrame(renderHumo);
  }

  function revelarEscenarioPremium() {
    document.getElementById('instruccion').style.opacity = '0';
    document.getElementById('feedback-soplido').style.opacity = '0';
    
    let escenario = document.getElementById('escenario-magico');
    escenario.style.display = 'flex';
    setTimeout(() => { escenario.style.opacity = '1'; }, 100);

    setTimeout(() => {
      document.getElementById('instruccion').innerText = "Toca mi corazón...";
      document.getElementById('instruccion').style.opacity = '1';
    }, 2000);
  }

  // --- ANIMACIÓN EXPLOSIÓN DE CORAZÓN A TEXTO ---
  let corazonExplotado = false;

  function explotarCorazon() {
    if (corazonExplotado) return;
    corazonExplotado = true;
    
    document.getElementById('instruccion').style.opacity = '0';
    const corazon = document.getElementById('gran-corazon');
    const rect = corazon.getBoundingClientRect();
    const centroX = rect.left + rect.width / 2;
    const centroY = rect.top + rect.height / 2;
    
    corazon.style.display = 'none'; // Desaparece el corazón principal

    // Generar partículas que viajan hacia la zona del texto
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.className = 'particula-explosion';
        p.innerHTML = '♥️';
        p.style.left = centroX + 'px';
        p.style.top = centroY + 'px';
        document.body.appendChild(p);

        // Animar hacia arriba y desvanecer
        setTimeout(() => {
            let destX = (Math.random() - 0.5) * window.innerWidth * 0.8;
            let destY = - (window.innerHeight * 0.4 + Math.random() * 100); // Suben al área de texto
            p.style.transform = `translate(${destX}px, ${destY}px) scale(${Math.random() + 0.5})`;
            p.style.opacity = '0';
        }, 50);

        // Limpiar DOM
        setTimeout(() => p.remove(), 1600);
    }

    // Retrasar la aparición del texto para que coincida con la llegada de las partículas
    setTimeout(prepararTextosDOM, 800);
  }

  function prepararTextosDOM() {
    const contenedorTexto = document.getElementById('contenedor-texto');
    contenedorTexto.innerHTML = '';
    
    let delayGlobal = 0; 

    lineasPoema.forEach((linea) => {
      let divLinea = document.createElement('div');
      divLinea.className = 'linea-poema';
      
      let palabrasDeLinea = linea.split(" ");
      palabrasDeLinea.forEach((textoPalabra) => {
        let spanPalabra = document.createElement('span');
        spanPalabra.className = 'palabra';
        spanPalabra.innerText = textoPalabra;
        divLinea.appendChild(spanPalabra);

        setTimeout(() => { spanPalabra.classList.add('visible'); }, delayGlobal);
        delayGlobal += 100; // Rapidez de aparición
      });
      
      contenedorTexto.appendChild(divLinea);
    });

    setTimeout(() => {
        document.getElementById('btn-regresar').classList.add('visible');
    }, delayGlobal + 1000);
  }

  function completarMisterio() {
    localStorage.setItem('progreso_camii_etapa1', 2); 
    window.location.href = 'etapa1.html';
  }

  async function iniciarMagiaVoz() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      permisoMicro = true;

      document.getElementById('ui-inicio').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('ui-inicio').style.display = 'none';
        document.getElementById('instruccion').style.opacity = '1';
        estadoEscuchando = true;
      }, 1000);

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      microphone = audioContext.createMediaStreamSource(stream);
      microphone.connect(analyser);
      analyser.fftSize = 2048; 
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      renderHumo(); 
    } catch (err) {
      alert("Necesito permiso para el micrófono. Por favor, recarga.");
    }
  }
</script>
</body>
</html>
