<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carga - El Misterio de la Energía</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300;400;600;800&display=swap');

  * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: #050203; /* Un negro con un levísimo toque cálido */
    font-family: 'Montserrat', sans-serif; overflow: hidden; color: white;
  }

  /* LA PISTA SUTIL */
  #pista-misterio {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 85%; text-align: center; color: #444; 
    font-weight: 300; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase;
    animation: palpitarPista 4s ease-in-out infinite alternate;
    transition: opacity 1s; z-index: 10; pointer-events: none; line-height: 1.8;
  }
  @keyframes palpitarPista { 0% { color: #222; } 100% { color: #666; text-shadow: 0 0 10px rgba(255,182,193,0.1); } }

  /* FONDO DE CORAZONES ESTÁTICOS */
  #fondo-corazones {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 1; pointer-events: none; overflow: hidden;
  }
  
  .corazon-estatico {
    position: absolute;
    font-family: 'Montserrat', sans-serif; 
    color: #ff69b4;
    opacity: 0; /* Ocultos al inicio */
    transition: opacity 2.5s ease-in-out; 
    text-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
  }

  /* --- TEXTO GRANDE ADICIONAL --- */
  #contenedor-titulo {
    position: absolute; top: 15%; width: 100%; text-align: center;
    z-index: 100; opacity: 0; transform: scale(0.9);
    transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
  }
  #contenedor-titulo.visible { opacity: 1; transform: scale(1); }
  
  .gran-titulo {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: clamp(2.5rem, 9vw, 4rem); 
    color: #ffd1dc; /* Rosa pastel muy suave */
    text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
    letter-spacing: 2px;
  }

  /* EL CONTENEDOR DEL POEMA (Mejor distribuido) */
  #contenedor-texto {
    position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
    width: 95%; max-width: 650px; 
    display: flex; flex-direction: column; align-items: center; gap: 10px; /* Más espacio entre líneas */
    z-index: 5;
  }

  .linea-texto { display: flex; justify-content: center; flex-wrap: nowrap; gap: 2px; }
  
  .letra {
    font-weight: 600; font-size: clamp(0.7rem, 3vw, 1.1rem); /* Letra un poco más grande */
    text-transform: uppercase; color: #050203; 
    transition: color 0.1s ease, text-shadow 0.1s ease, transform 0.1s;
    display: inline-block;
  }
  .espacio { width: 6px; }

  /* ESTADO: LETRA ENCENDIDA LOCAL (Mantiene el tono eléctrico inicial) */
  .letra.iluminada-local {
    color: #ffffff; text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff; transform: scale(1.15); 
  }
  .letra.corazon.iluminada-local {
    color: #ffb6c1; text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493; transform: scale(1.4);
  }

  /* ESTADO FINAL: NEÓN ROMÁNTICO COHESIVO */
  .frase-completa-neon .letra {
    color: #fff0f5; /* Blanco lavanda/rosado */
    text-shadow: 0 0 10px #ffb6c1, 0 0 20px #ff69b4, 0 0 30px #ff1493;
    transition: color 1.5s ease, text-shadow 1.5s ease, transform 1s ease; transform: scale(1);
  }
  .frase-completa-neon .letra.corazon {
    color: #ff69b4; text-shadow: 0 0 15px #ff1493, 0 0 30px #c71585;
    font-size: 1.3em; 
  }

  /* LA BOLA DE ENERGÍA VISUAL MÁGICA */
  #bola-energia {
    position: fixed; top: 0; left: 0;
    width: 14px; height: 14px; border-radius: 50%;
    background-color: #ffffff;
    box-shadow: 0 0 20px 10px rgba(0, 229, 255, 0.8), 0 0 40px 20px rgba(0, 229, 255, 0.4);
    opacity: 0; z-index: 50; pointer-events: none;
    transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s; 
    transform: translate(calc(50vw - 7px), calc(100vh + 20px)) scale(0);
  }

  /* BOTONES */
  #btn-revelar, #btn-regresar-final {
    position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
    padding: 15px 45px; border-radius: 30px;
    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.9rem;
    cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
    opacity: 0; pointer-events: none; transition: all 1s ease; z-index: 100;
  }
  
  #btn-revelar {
    background: transparent; border: 1px solid #00e5ff; color: #00e5ff;
    box-shadow: 0 0 15px rgba(0,229,255,0.2);
  }
  #btn-revelar.visible { opacity: 1; pointer-events: auto; background: rgba(0,229,255,0.05); }
  #btn-revelar:active { background: rgba(0,229,255,0.2); transform: translateX(-50%) scale(0.95); }

  #btn-regresar-final {
    background: transparent; border: 1px solid #ff69b4; color: #ffb6c1;
    box-shadow: 0 0 15px rgba(255,105,180,0.3);
  }
  #btn-regresar-final.visible { opacity: 1; pointer-events: auto; background: rgba(255,105,180,0.08); }
  #btn-regresar-final:active { background: rgba(255,105,180,0.2); transform: translateX(-50%) scale(0.95); }

</style>
</head>
<body oncontextmenu="return false;">

  <div id="fondo-corazones"></div>

  <div id="pista-misterio">Iniciando conexión neuronal...</div>

  <div id="contenedor-titulo">
    <div class="gran-titulo">Mi Cachetoncita</div>
  </div>

  <div id="contenedor-texto"></div>

  <div id="bola-energia"></div>

  <button id="btn-revelar" onclick="secuenciaEncendidoFinalOptimizado()">Iluminar</button>
  <button id="btn-regresar-final" onclick="window.location.href='etapa1.html'">Regresar</button>

<script>
  const lineasCarga = [
    "Tú eres la chispa que encendió algo",
    "en mí que no sabía que faltaba,",
    "la energía que ilumina mis días",
    "incluso cuando todo parece apagarse.",
    "Desde que llegaste, todo tiene",
    "más color, más vida y más sentido.",
    "Eres esa luz que me levanta,",
    "que me calma y que hace que todo",
    "brille diferente solo por estar tú.",
    "♥️"
  ];
  
  const contenedorTexto = document.getElementById('contenedor-texto');
  const pistaMisterio = document.getElementById('pista-misterio');
  const btnRevelar = document.getElementById('btn-revelar');
  const btnRegresarFinal = document.getElementById('btn-regresar-final');
  const bolaEnergia = document.getElementById('bola-energia');
  const fondoCorazones = document.getElementById('fondo-corazones');
  const contenedorTitulo = document.getElementById('contenedor-titulo');
  
  let letrasElements = []; 
  let magiaIniciada = false;
  let esperandoDesconexion = false;
  let toquesDeEnergia = 0; 

  // 1. INYECTAR EL POEMA
  function prepararTexto() {
    lineasCarga.forEach(linea => {
      let divLinea = document.createElement('div');
      divLinea.className = 'linea-texto';
      
      [...linea].forEach((char) => {
        let span = document.createElement('span');
        
        if (char === ' ') {
          span.className = 'letra espacio';
          span.innerHTML = '&nbsp;'; 
        } else if (char === '♥️') {
          span.className = 'letra corazon';
          span.innerText = char;
        } else {
          span.className = 'letra';
          span.innerText = char;
        }
        
        divLinea.appendChild(span);
        if (char !== ' ') { letrasElements.push(span); }
      });
      contenedorTexto.appendChild(divLinea);
    });
  }

  // 2. PREPARAR CORAZONES ESTÁTICOS (Invisibles al inicio)
  function prepararCorazonesEstaticos() {
    const cantidad = 35; // Cantidad perfecta para rellenar sin saturar
    for(let i = 0; i < cantidad; i++) {
      let corazon = document.createElement('div');
      corazon.className = 'corazon-estatico';
      corazon.innerHTML = '♥️';
      
      // Posiciones aleatorias por toda la pantalla
      corazon.style.left = Math.random() * 95 + 'vw';
      corazon.style.top = Math.random() * 90 + 'vh';
      
      // Tamaños y rotaciones sutiles
      let scale = Math.random() * 1.2 + 0.4;
      let rotacion = Math.random() * 60 - 30; // Entre -30 y 30 grados
      corazon.style.transform = `scale(${scale}) rotate(${rotacion}deg)`;
      
      fondoCorazones.appendChild(corazon);
    }
  }

  // 3. SISTEMA DE RESPALDO (MAGIA TÁCTIL)
  function activarMagiaManual() {
    document.body.addEventListener('click', () => {
        if (magiaIniciada) return;
        toquesDeEnergia++;
        
        if (toquesDeEnergia === 1) {
            pistaMisterio.innerHTML = "Siento tu energía... Toca la pantalla 3 veces más.";
        } else if (toquesDeEnergia === 2) {
            pistaMisterio.innerHTML = "Un poco más de energía... ✨";
        } else if (toquesDeEnergia === 4) {
            pistaMisterio.innerHTML = "¡Conexión establecida por tu tacto!";
            arrancarMagiaVisual();
        }
    });
  }

  // 4. MONITOREO DE BATERÍA FÍSICO
  async function iniciarMonitoreoBateria() {
    if (!('getBattery' in navigator)) {
      pistaMisterio.innerHTML = "Tu dispositivo protege su energía...<br>Transfiérela tocando el centro de la pantalla.";
      activarMagiaManual();
      return;
    }

    try {
      const battery = await navigator.getBattery();
      
      if (battery.charging) {
        esperandoDesconexion = true;
        pistaMisterio.innerHTML = "El vínculo está saturado...<br>Desconecta el cable o toca la pantalla 4 veces.";
        activarMagiaManual();
      } else {
        esperandoDesconexion = false;
        pistaMisterio.innerHTML = "A este universo le falta energía física<br>Conecta tu cargador para despertar...";
      }

      battery.addEventListener('chargingchange', () => {
        if (!battery.charging) {
          esperandoDesconexion = false;
          pistaMisterio.style.opacity = '0';
          setTimeout(() => {
            pistaMisterio.innerHTML = "A este universo le falta energía física<br>Conecta tu cargador para despertar...";
            pistaMisterio.style.opacity = '1';
          }, 800);
        } 
        else if (battery.charging && !esperandoDesconexion && !magiaIniciada) {
          arrancarMagiaVisual();
        }
      });

    } catch (error) {
      pistaMisterio.innerHTML = "Toca la pantalla 4 veces para transferir tu energía.";
      activarMagiaManual();
    }
  }

  // 5. LA MAGIA: NACE LA BOLA DEL PUERTO DE CARGA
  function arrancarMagiaVisual() {
    magiaIniciada = true;
    pistaMisterio.style.opacity = '0';

    setTimeout(() => {
      bolaEnergia.style.opacity = '1';
      bolaEnergia.style.transform = `translate(calc(50vw - 7px), calc(100vh - 60px)) scale(1)`;
    }, 1000);

    setTimeout(() => {
      enviarBolaAPrimeraLetra();
    }, 2500); 
  }

  // 6. VIAJE A LA PRIMERA LETRA
  function enviarBolaAPrimeraLetra() {
    const primeraLetra = letrasElements[0];
    const rect = primeraLetra.getBoundingClientRect();
    
    const destX = rect.left + (rect.width / 2) - 7; 
    const destY = rect.top + (rect.height / 2) - 7;

    bolaEnergia.style.transform = `translate(${destX}px, ${destY}px) scale(1)`;

    setTimeout(() => {
      bolaEnergia.style.opacity = '0'; 
      bolaEnergia.style.transform = `translate(${destX}px, ${destY}px) scale(0)`; 
      
      setTimeout(recorrerLetrasLentamente, 400);
    }, 2500);
  }

  // 7. EL PULSO POR LAS LETRAS
  function recorrerLetrasLentamente() {
    let indiceActual = 0;
    const tiempoLento = 100; 

    function pasoSiguiente() {
      if (indiceActual > 0) {
        letrasElements[indiceActual - 1].classList.remove('iluminada-local');
      }

      if (indiceActual >= letrasElements.length) {
        renacerBolaHaciaBoton();
        return;
      }

      letrasElements[indiceActual].classList.add('iluminada-local');
      indiceActual++;
      setTimeout(pasoSiguiente, tiempoLento);
    }

    pasoSiguiente();
  }

  // 8. RENACIMIENTO DE LA BOLA HACIA EL BOTÓN
  function renacerBolaHaciaBoton() {
    const ultimaLetra = letrasElements[letrasElements.length - 1];
    const rectUltima = ultimaLetra.getBoundingClientRect();
    
    const startX = rectUltima.left + (rectUltima.width / 2) - 7;
    const startY = rectUltima.top + (rectUltima.height / 2) - 7;

    bolaEnergia.style.transition = 'none'; 
    bolaEnergia.style.transform = `translate(${startX}px, ${startY}px) scale(0)`;

    setTimeout(() => {
      bolaEnergia.style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s';
      bolaEnergia.style.opacity = '1';
      bolaEnergia.style.transform = `translate(${startX}px, ${startY}px) scale(1)`;

      setTimeout(() => {
        const destX = window.innerWidth / 2 - 7;
        const destY = window.innerHeight * 0.92 - 25; 

        bolaEnergia.style.transform = `translate(${destX}px, ${destY}px) scale(1)`;

        setTimeout(() => {
          bolaEnergia.style.opacity = '0';
          bolaEnergia.style.transform = `translate(${destX}px, ${destY}px) scale(0)`;
          btnRevelar.classList.add('visible'); 
        }, 1500); 
        
      }, 500); 
    }, 50);
  }

  // --- 9. SECUENCIA FINAL: TODO SE ILUMINA ROMÁNTICAMENTE ---
  function secuenciaEncendidoFinalOptimizado() {
    btnRevelar.style.display = 'none'; 
    
    // Encender el poema
    setTimeout(() => {
      contenedorTexto.classList.add('frase-completa-neon');
      localStorage.setItem('progreso_camii_etapa1', 3); 
    }, 300);

    // Encender el Gran Título
    setTimeout(() => {
      contenedorTitulo.classList.add('visible'); 
    }, 1200); 

    // Encender corazones estáticos del fondo y mostrar botón regresar
    setTimeout(() => {
      encenderCorazonesEstaticos();
      btnRegresarFinal.classList.add('visible');
    }, 2000); 
  }

  function encenderCorazonesEstaticos() {
    const corazones = document.querySelectorAll('.corazon-estatico');
    corazones.forEach(corazon => {
      // Opacidad sutil aleatoria para que se vea como un patrón suave
      corazon.style.opacity = Math.random() * 0.25 + 0.05; 
    });
  }

  window.onload = () => {
    prepararTexto();
    prepararCorazonesEstaticos();
    iniciarMonitoreoBateria();
  };
</script>
</body>
</html>
