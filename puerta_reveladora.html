<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Puerta del Destino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap');

  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #16080b 0%, #0a0506 100%);
    font-family: 'Poppins', sans-serif; overflow: hidden; color: white;
  }

  .btn-volver-sutil {
    position: absolute; top: 20px; left: 20px; padding: 10px 20px; border-radius: 30px;
    background: rgba(255, 71, 87, 0.05); color: #ffb8bf; border: 1px solid rgba(255, 71, 87, 0.2);
    cursor: pointer; z-index: 2000; backdrop-filter: blur(5px); font-size: 0.8rem;
  }

  #escena-puerta {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
    z-index: 100;
  }

  #pre-texto { width: 90%; text-align: center; margin-top: 20px; }
  .titulo-congrat { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; color: #ff4757; margin-bottom: 8px; }

  /* --- ÁREA DE INTERACCIÓN TOTAL --- */
  .zona-tocar-puerta {
    position: relative;
    width: 220px; height: 350px;
    cursor: pointer;
    z-index: 500; /* Asegura que esté por encima de todo */
  }

  #puerta-contenedor {
    width: 100%; height: 100%; border-radius: 15px 15px 0 0;
    background: linear-gradient(to right, #3a2214, #2d1a11, #3a2214);
    border: 6px solid #140b06; border-bottom: none;
    box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: space-around;
    padding: 20px 0; pointer-events: none; /* El clic lo recibe el padre .zona-tocar-puerta */
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: palpitar 3s infinite alternate;
  }

  /* Efecto de hundimiento forzado */
  .zona-tocar-puerta:active #puerta-contenedor {
    transform: scale(0.92);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
    filter: brightness(0.7);
  }

  @keyframes palpitar { 0% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); } 100% { box-shadow: 0 0 40px rgba(0, 229, 255, 0.4); } }

  .panel-madera { width: 60%; height: 28%; border: 2px solid #140b06; background: rgba(0,0,0,0.3); border-radius: 4px; }
  #cerrojo { font-size: 3.5rem; color: #ff4757; text-shadow: 0 0 20px rgba(255, 71, 87, 0.9); }

  #contenedor-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; }
  #video-revelador { width: 100%; height: 100%; object-fit: contain; }

  #post-mensaje { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0506; z-index: 1100; display: none; align-items: center; justify-content: center; }
  .panel-final { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,71,87,0.2); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
  .texto-poema-final { text-align: left; line-height: 1.8; font-size: 1.05rem; }

  #btn-regresar-mapa { margin-top: 25px; padding: 15px 30px; border-radius: 30px; border: none; background: #ff4757; color: white; font-weight: 600; opacity: 0; }
  .visible { opacity: 1 !important; }
</style>
</head>
<body>

  <button class="btn-volver-sutil" onclick="window.location.href='etapa1.html'">← Volver</button>

  <div id="escena-puerta">
    <div id="pre-texto">
      <div class="titulo-congrat">¡Ya tienes la llave!</div>
      <p style="color: #ffb8bf;">Toca la puerta para desbloquear mi secreto... ♥️</p>
    </div>
    
    <div class="zona-tocar-puerta" onclick="abrirPuerta()">
      <div id="puerta-contenedor">
        <div class="panel-madera"></div>
        <div id="cerrojo">♥️</div>
        <div class="panel-madera"></div>
      </div>
    </div>
  </div>

  <div id="contenedor-video">
    <video id="video-revelador" playsinline>
      <source src="tu-video-romantico.mp4" type="video/mp4">
    </video>
  </div>

  <div id="post-mensaje">
    <div class="panel-final">
      <h2 style="color:#ff4757">Para mi cachetona</h2>
      <div id="texto-final" class="texto-poema-final"></div>
      <button id="btn-regresar-mapa" onclick="terminar()">Volver Atrás</button>
    </div>
  </div>

<script>
  const video = document.getElementById('video-revelador');
  const msg = "TE AMO MUCHOOO MI CACHETONCITA, espero siempre alegrarte el día. Siempre hago todo con amor. Y aunque no sea o no tenga las mejores respuestas siempre busco mejorar, porque tú mereces lo mejor de mí ♥️";

  function abrirPuerta() {
    // Intentar dar permiso al video al primer toque
    video.play().then(() => { video.pause(); video.currentTime = 0; });

    const puerta = document.getElementById('puerta-contenedor');
    const escena = document.getElementById('escena-puerta');

    // Animación de apertura total
    puerta.style.transition = "transform 1s ease-in, opacity 0.8s ease-out";
    puerta.style.transform = "perspective(1000px) rotateY(-110deg) scale(0.5)";
    puerta.style.opacity = "0";

    setTimeout(() => {
      escena.style.display = 'none';
      document.getElementById('contenedor-video').style.display = 'block';
      video.play();
    }, 900);
  }

  video.onended = () => {
    document.getElementById('contenedor-video').style.display = 'none';
    document.getElementById('post-mensaje').style.display = 'flex';
    let i = 0;
    const timer = setInterval(() => {
      if(i < msg.length) {
        document.getElementById('texto-final').innerHTML += msg.charAt(i);
        i++;
      } else {
        clearInterval(timer);
        document.getElementById('btn-regresar-mapa').classList.add('visible');
      }
    }, 50);
  };

  function terminar() {
    localStorage.setItem('progreso_camii_etapa1', 5);
    window.location.href = 'etapa1.html';
  }
</script>
</body>
</html>
