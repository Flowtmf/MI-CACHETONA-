<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cachetona ♥️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:black;
    font-weight:bold;
    font-size:18px;
}

.logo{
    cursor:pointer;
}

/* CATEGORIES */
.categories{
    display:flex;
    gap:10px;
    padding:10px;
    overflow-x:auto;
}

.cat{
    background:#222;
    padding:8px 14px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
}

.cat.active{
    background:white;
    color:black;
}

/* CONTENT */
.content{
    padding-bottom:80px;
}

.video{
    margin-bottom:20px;
}

.thumbnail{
    width:100%;
    height:200px;
    object-fit:cover;
}

.title{
    padding:10px;
    font-size:15px;
}

/* BOTTOM NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    font-size:12px;
}

.nav div{
    cursor:pointer;
    text-align:center;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:none;
    flex-direction:column;
    z-index:1000;
    overflow:auto;
}

.close{
    padding:15px;
    background:#181818;
    cursor:pointer;
}

.modal-content{
    padding:20px;
}

input{
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px;
    margin-top:10px;
    width:100%;
    border:none;
    background:#ff0033;
    color:white;
    border-radius:5px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="logo" onclick="abrirModal('password')">Mi cachetona ♥️</div>
    <div>🔍</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat active">Todo</div>
    <div class="cat" onclick="abrirModal('musica')">Música</div>
    <div class="cat">Mixes</div>
    <div class="cat">Hip hop latino</div>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="video">
        <img src="foto1.jpg" class="thumbnail">
        <div class="title">Nuestro recuerdo favorito</div>
    </div>

    <div class="video">
        <img src="foto2.jpg" class="thumbnail">
        <div class="title">La razón por la que sonrío</div>
    </div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">
    <div>Inicio</div>
    <div onclick="abrirModal('musica')">Música</div>
    <div onclick="abrirModal('subs')">Suscripciones</div>
    <div onclick="abrirModal('noti')">Notificaciones</div>
    <div>Tú</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="close" onclick="cerrarModal()">⬅ Volver</div>
    <div class="modal-content" id="contenido"></div>
</div>

<script>

function abrirModal(tipo){
    const modal = document.getElementById("modal");
    const contenido = document.getElementById("contenido");

    if(tipo==="musica"){
        contenido.innerHTML = `
        <h2>Música que me recuerda a ti 🎵</h2>
        <img src="portada1.jpg" class="thumbnail">
        <p>Aquí pondrás la canción 1</p>
        <img src="portada2.jpg" class="thumbnail">
        <p>Aquí pondrás la canción 2</p>
        `;
    }

    if(tipo==="subs"){
        contenido.innerHTML = `
        <h2>Suscripciones</h2>
        <p>No tengo suscripciones… yo solo te sigo a ti ❤️</p>
        `;
    }

    if(tipo==="noti"){
        contenido.innerHTML = `
        <h2>Notificaciones</h2>
        <img src="notificacion.jpg" class="thumbnail">
        <p>Esta es la única notificación que espero 💌</p>
        `;
    }

    if(tipo==="password"){
        contenido.innerHTML = `
        <h2>Área privada 🔒</h2>
        <p>Ingresa la contraseña</p>
        <input type="password" id="pass">
        <button onclick="verificar()">Entrar</button>
        `;
    }

    modal.style.display="flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

function verificar(){
    const clave="1234"; // CAMBIA ESTO
    const valor=document.getElementById("pass").value;

    if(valor===clave){
        document.getElementById("contenido").innerHTML=
        "<h2>Bienvenida mi amor ❤️</h2><p>Aquí va el lugar secreto que solo tú puedes ver.</p>";
    } else {
        alert("Contraseña incorrecta 😢");
    }
}

</script>

</body>
</html>
