<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cachetona ♥️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

/* TOP */
.topbar{
    background:black;
    padding:15px;
    font-weight:bold;
    font-size:18px;
}

/* VIDEO LIST */
.video{
    margin-bottom:25px;
    cursor:pointer;
}

.thumbnail{
    width:100%;
    height:220px;
    object-fit:cover;
}

.title{
    padding:10px;
    font-size:15px;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
    text-align:center;
    display:none;
    width:80%;
    box-shadow:0 0 20px rgba(0,0,0,0.8);
}

.popup h2{
    margin-top:0;
}

.close{
    margin-top:15px;
    background:#ff0033;
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Mi cachetona ♥️</div>

<!-- VIDEOS -->
<div class="video">
    <img src="foto1.jpg" class="thumbnail">
    <div class="title">Nuestro primer recuerdo</div>
</div>

<div class="video">
    <img src="foto2.jpg" class="thumbnail">
    <div class="title">Tu sonrisa favorita</div>
</div>

<div class="video">
    <img src="foto3.jpg" class="thumbnail">
    <div class="title">Ese día especial</div>
</div>

<div class="video">
    <img src="foto4.jpg" class="thumbnail">
    <div class="title">Momentos únicos</div>
</div>

<div class="video">
    <img src="foto5.jpg" class="thumbnail">
    <div class="title">La razón por la que te amo</div>
</div>

<div class="video">
    <img src="foto6.jpg" class="thumbnail">
    <div class="title">Nuestro video especial 🎬</div>
</div>

<!-- VIDEO 7 BLOQUEADO -->
<div class="video" onclick="verBloqueado()">
    <img src="foto7.jpg" class="thumbnail">
    <div class="title">🔒 Sorpresa del 13 de marzo</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h2>🔒 Bloqueado</h2>
    <p id="contador"></p>
    <button class="close" onclick="cerrar()">Cerrar</button>
</div>

<script>

const fechaObjetivo = new Date("March 13, 2026 00:00:00").getTime();

function verBloqueado(){
    const ahora = new Date().getTime();
    const distancia = fechaObjetivo - ahora;

    if(distancia <= 0){
        document.getElementById("contador").innerHTML =
        "Ya se desbloqueó ❤️ Aquí pondrás la sorpresa.";
    } else {
        actualizarContador();
        setInterval(actualizarContador,1000);
    }

    document.getElementById("popup").style.display="block";
}

function actualizarContador(){
    const ahora = new Date().getTime();
    const distancia = fechaObjetivo - ahora;

    const dias = Math.floor(distancia / (1000*60*60*24));
    const horas = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));
    const minutos = Math.floor((distancia % (1000*60*60)) / (1000*60));
    const segundos = Math.floor((distancia % (1000*60)) / 1000);

    document.getElementById("contador").innerHTML =
    "Disponible en:<br><b>" +
    dias + "d " + horas + "h " +
    minutos + "m " + segundos + "s</b>";
}

function cerrar(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
