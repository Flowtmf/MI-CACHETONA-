<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Arial', sans-serif;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    background:#181818;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    position:sticky;
    top:0;
}

/* VIDEO LISTA */
.video{
    margin-bottom:25px;
    cursor:pointer;
}

.thumbnail{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.title{
    font-size:16px;
    font-weight:bold;
}

.subtitle{
    font-size:13px;
    color:#aaa;
}

/* CONTADOR */
.countdown-box{
    display:flex;
    justify-content:center;
    align-items:center;
    height:200px;
    background:linear-gradient(135deg,#ff4d6d,#a100ff);
    font-size:18px;
    text-align:center;
    padding:20px;
}

/* MINI PAGINA */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:none;
    flex-direction:column;
    overflow:auto;
    z-index:1000;
}

.modal-content{
    padding:20px;
}

.close{
    padding:15px;
    font-size:18px;
    cursor:pointer;
    background:#181818;
}

iframe{
    width:100%;
    height:220px;
}
</style>
</head>

<body>

<header>Para la mujer más especial ❤️</header>

<!-- VIDEO 1 (CONTADOR) -->
<div class="video" onclick="abrirModal('contador')">
    <div class="countdown-box" id="contador"></div>
    <div class="info">
        <div class="title">Cuenta regresiva 💖</div>
        <div class="subtitle">Hasta el 13 de marzo</div>
    </div>
</div>

<!-- VIDEO 2 -->
<div class="video" onclick="abrirModal('v2')">
    <img src="foto2.jpg" class="thumbnail">
    <div class="info">
        <div class="title">TÍTULO 2</div>
        <div class="subtitle">Nuestro recuerdo</div>
    </div>
</div>

<!-- VIDEO 3 -->
<div class="video" onclick="abrirModal('v3')">
    <img src="foto3.jpg" class="thumbnail">
    <div class="info">
        <div class="title">TÍTULO 3</div>
        <div class="subtitle">Momentos únicos</div>
    </div>
</div>

<!-- VIDEO 4 -->
<div class="video" onclick="abrirModal('v4')">
    <img src="foto4.jpg" class="thumbnail">
    <div class="info">
        <div class="title">TÍTULO 4</div>
        <div class="subtitle">Mi lugar favorito</div>
    </div>
</div>

<!-- VIDEO 5 -->
<div class="video" onclick="abrirModal('v5')">
    <img src="foto5.jpg" class="thumbnail">
    <div class="info">
        <div class="title">TÍTULO 5</div>
        <div class="subtitle">Siempre tú</div>
    </div>
</div>

<!-- VIDEO 6 (VIDEO REAL) -->
<div class="video" onclick="abrirModal('videoReal')">
    <img src="foto6.jpg" class="thumbnail">
    <div class="info">
        <div class="title">Nuestro video 🎬</div>
        <div class="subtitle">Presiona para ver</div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="close" onclick="cerrarModal()">⬅ Volver</div>
    <div class="modal-content" id="contenidoModal"></div>
</div>

<script>

/* CONTADOR */
const fechaObjetivo = new Date("March 13, 2026 00:00:00").getTime();
const contador = document.getElementById("contador");

setInterval(function(){
    const ahora = new Date().getTime();
    const distancia = fechaObjetivo - ahora;

    const dias = Math.floor(distancia / (1000*60*60*24));
    const horas = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));
    const minutos = Math.floor((distancia % (1000*60*60)) / (1000*60));
    const segundos = Math.floor((distancia % (1000*60)) / 1000);

    contador.innerHTML = 
    "Faltan<br><b>" + dias + " días</b><br>" +
    horas + "h " + minutos + "m " + segundos + "s";
},1000);

/* MODAL */
function abrirModal(tipo){
    const modal = document.getElementById("modal");
    const contenido = document.getElementById("contenidoModal");

    if(tipo === "contador"){
        contenido.innerHTML = "<h2>El día que el mundo mejoró 💕</h2><p>Gracias por existir y cumplir un año más iluminando mi vida.</p>";
    }

    if(tipo === "v2"){
        contenido.innerHTML = "<h2>TÍTULO 2</h2><p>Aquí va el mensaje especial que tú quieras.</p>";
    }

    if(tipo === "v3"){
        contenido.innerHTML = "<h2>TÍTULO 3</h2><p>Otro mensaje profundo aquí.</p>";
    }

    if(tipo === "v4"){
        contenido.innerHTML = "<h2>TÍTULO 4</h2><p>Texto romántico personalizado.</p>";
    }

    if(tipo === "v5"){
        contenido.innerHTML = "<h2>TÍTULO 5</h2><p>Más palabras que la hagan sonreír.</p>";
    }

    if(tipo === "videoReal"){
        contenido.innerHTML = `
        <h2>Nuestro video 🎥</h2>
        <iframe src="https://www.youtube.com/embed/VIDEO_ID" 
        frameborder="0" allowfullscreen></iframe>`;
    }

    modal.style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
