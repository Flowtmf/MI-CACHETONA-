<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c,#2a0f1f);
    color:white;
}

header{
    text-align:center;
    padding:30px 20px;
}

h1{
    font-size:2em;
    margin-bottom:10px;
}

.countdown{
    font-size:1.2em;
    color:#ff7aa2;
}

.section-title{
    margin:20px;
    font-size:1.4em;
}

.videos{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#181818;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.6);
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card-title{
    padding:10px;
    font-size:0.9em;
}

.locked{
    display:flex;
    justify-content:center;
    align-items:center;
    height:120px;
    background:#333;
    font-size:1em;
    color:#999;
}

footer{
    text-align:center;
    padding:20px;
    font-size:0.9em;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>Para la mujer más especial ❤️</h1>
    <div class="countdown" id="contador"></div>
</header>

<h2 class="section-title">Nuestros momentos 🎬</h2>

<div class="videos">

    <!-- VIDEO 1 -->
    <div class="card">
        <img src="foto1.jpg">
        <div class="card-title">TÍTULO 1</div>
    </div>

    <!-- VIDEO 2 -->
    <div class="card">
        <img src="foto2.jpg">
        <div class="card-title">TÍTULO 2</div>
    </div>

    <!-- VIDEO 3 -->
    <div class="card">
        <img src="foto3.jpg">
        <div class="card-title">TÍTULO 3</div>
    </div>

    <!-- VIDEO 4 -->
    <div class="card">
        <img src="foto4.jpg">
        <div class="card-title">TÍTULO 4</div>
    </div>

    <!-- VIDEO 5 -->
    <div class="card">
        <img src="foto5.jpg">
        <div class="card-title">TÍTULO 5</div>
    </div>

    <!-- VIDEO 6 -->
    <div class="card">
        <img src="foto6.jpg">
        <div class="card-title">TÍTULO 6</div>
    </div>

    <!-- BLOQUEADO -->
    <div class="card">
        <div class="locked">🔒 Bloqueado</div>
        <div class="card-title">Disponible el 13 de marzo...</div>
    </div>

</div>

<footer>
Hecho con todo mi amor 💌
</footer>

<script>
const fechaObjetivo = new Date("March 13, 2026 00:00:00").getTime();

const contador = document.getElementById("contador");

setInterval(function(){
    const ahora = new Date().getTime();
    const distancia = fechaObjetivo - ahora;

    const dias = Math.floor(distancia / (1000*60*60*24));
    const horas = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));
    const minutos = Math.floor((distancia % (1000*60*60)) / (1000*60));
    const segundos = Math.floor((distancia % (1000*60)) / 1000);

    contador.innerHTML = "Faltan " + dias + " días " + horas + "h " + minutos + "m " + segundos + "s para el 13 de marzo 💖";
},1000);
</script>

</body>
</html>
